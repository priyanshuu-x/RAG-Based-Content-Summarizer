name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app.py tests/

      - name: Run tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-app:ci-check .

# NOTE: No "deploy" job here on purpose.
#
# This app is deployed via Streamlit Community Cloud, which watches the
# linked GitHub repo directly and auto-redeploys on every push to `main`
# using requirements.txt (it does NOT use the Dockerfile above).
#
# The `docker-build` job is kept as a validation check — it confirms the
# Dockerfile still builds cleanly, which matters if this project is ever
# deployed elsewhere (Render, Cloud Run, etc.) later. It's a safety net,
# not a deployment gate, for the current hosting setup.
#
# If you move to a Docker-based host again in the future, re-add a
# "deploy" job here that triggers that platform's deploy hook, the way
# the old Render-based version of this workflow did.